<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; padding: 20px;">
    <h2>Ultimate SEO Rank Auditor</h2>
    <textarea id="keywords" rows="5" style="width:100%" placeholder="Paste keywords here, one per line"></textarea>
    <br><br>
    <button onclick="checkRanks()">Check Ranks</button>
    <button id="copyBtn" onclick="copyToClipboard()" style="display:none; background-color: #4CAF50; color: white;">Copy to Sheets</button>
    
    <div id="results" style="margin-top:20px;"></div>

    <script>
        let lastResults = [];

        async function checkRanks() {
            const lines = document.getElementById('keywords').value.split('\n').filter(k => k.trim() !== "");
            const output = document.getElementById('results');
            output.innerHTML = "Checking... please wait.";
            document.getElementById('copyBtn').style.display = "none";
            
            const fetchPromises = lines.map(async (keyword) => {
                try {
                    let response = await fetch(`/api/index?keyword=${encodeURIComponent(keyword)}`);
                    let data = await response.json();
                    return { keyword, rank: data.rank, url: data.url };
                } catch (err) {
                    return { keyword, rank: "Error", url: "-" };
                }
            });

            lastResults = await Promise.all(fetchPromises);

            let html = "<table border='1' cellpadding='10' style='border-collapse: collapse; width: 100%;'><tr><th>Keyword</th><th>Rank</th><th>Ranking URL</th></tr>";
            lastResults.forEach(res => {
                html += `<tr><td>${res.keyword}</td><td>${res.rank}</td><td>${res.url}</td></tr>`;
            });
            html += "</table>";
            
            output.innerHTML = html;
            document.getElementById('copyBtn').style.display = "inline-block";
        }

        function copyToClipboard() {
            // Only copies Keyword and Rank. URL is excluded from copy.
            let tsvContent = "Keyword\tRank\n";
            lastResults.forEach(res => {
                tsvContent += `${res.keyword}\t${res.rank}\n`;
            });

            navigator.clipboard.writeText(tsvContent).then(() => {
                alert("Copied Keyword and Rank to clipboard! Just paste into Google Sheets.");
            });
        }
    </script>
</body>
</html>
